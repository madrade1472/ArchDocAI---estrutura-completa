# Local-only convenience stack. Production hosts use the Dockerfile directly
# via Cloud Run / Fly.io / Render / Railway / etc.
#
# Quick start:
#   cp .env.example .env   # fill in LLM_API_KEY at minimum
#   docker compose up --build
#   # open http://localhost:8000

services:
  web:
    build: .
    container_name: archdocai
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override any compose-time defaults here. Useful when you want a
      # different bind without editing .env.
      PORT: 8000
    volumes:
      # Mount output and logs so generated PDFs and the rotating log
      # survive container restarts during local testing.
      - ./output:/app/output
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 25s
